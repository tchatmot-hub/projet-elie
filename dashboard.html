<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PORTAIL DES COURS - Dashboard Délégué</title>
  <meta name="description" content="Tableau de bord moderne pour le délégué d'une classe universitaire." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css" />
  <script defer src="src/utils.js"></script>
  <script defer src="shared-components.js"></script>
  <script defer src="dashboard.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main">
      <header class="topbar" id="topbar"></header>

      <main class="content">
        <section class="hero-card" id="dashboard"></section>

        <section class="stats-grid" id="stats-grid"></section>

        <section class="workspace-grid">
          <article class="panel large-panel" id="add-document"></article>

          <aside class="panel side-stack">
            <section class="mini-panel" id="announcements"></section>
            <section class="mini-panel" id="activity-panel"></section>
          </aside>
        </section>

        <section class="workspace-grid lower-grid">
          <article class="panel" id="my-documents"></article>
          <article class="panel stats-panel" id="statistics"></article>
        </section>

        <section class="workspace-grid lower-grid">
          <article class="panel wide-panel" id="subjects"></article>
          <article class="panel wide-panel" id="settings"></article>
        </section>
      </main>
    </div>
  </div>

  <div class="notification" id="notification"></div>
</body>
</html>
