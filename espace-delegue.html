<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PORTAIL DES COURS - Espace Délégué</title>
  <meta name="description" content="Espace délégué moderne pour la gestion des documents universitaires." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="espace-delegue.css" />
  <script defer src="src/utils.js"></script>
  <script defer src="shared-components.js"></script>
  <script defer src="espace-delegue.js"></script>
</head>
<body>
  <div class="auth-screen" id="auth-screen">
    <div class="auth-card">
      <p class="eyebrow">Accès sécurisé</p>
      <h1>Espace Délégué</h1>
      <p class="auth-text">Cet espace est réservé au délégué principal. Les autres étudiants ne peuvent pas y accéder sans authentification.</p>

      <form class="auth-form" id="auth-form">
        <label>
          <span>Identifiant</span>
          <input id="auth-username" type="text" placeholder="delegue" autocomplete="username" />
        </label>
        <label>
          <span>Mot de passe</span>
          <input id="auth-password" type="password" placeholder="Mot de passe" autocomplete="current-password" />
        </label>
        <button class="primary-button full-width" type="submit">Entrer dans l'espace</button>
      </form>

      <div class="auth-note">
        <strong>Rôle unique</strong>
        <p>Un seul compte administrateur gère les publications, les annonces et les statistiques.</p>
      </div>
    </div>
  </div>

  <div class="layout" id="delegate-layout" hidden>
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main">
      <header class="topbar" id="topbar"></header>

      <main class="content">
        <section class="hero-card" id="dashboard"></section>

        <section class="stats-grid" id="stats-grid"></section>

        <section class="workspace-grid">
          <article class="panel large-panel" id="add-document"></article>

          <aside class="panel side-stack">
            <section class="mini-panel" id="announcements"></section>
            <section class="mini-panel" id="activity-panel"></section>
          </aside>
        </section>

        <section class="workspace-grid lower-grid">
          <article class="panel" id="my-documents"></article>
          <article class="panel stats-panel" id="statistics"></article>
        </section>

        <section class="workspace-grid lower-grid">
          <article class="panel wide-panel" id="subjects"></article>
          <article class="panel wide-panel" id="settings"></article>
        </section>
      </main>
    </div>
  </div>

  <div class="notification" id="notification"></div>
</body>
</html>
